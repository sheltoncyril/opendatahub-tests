name: Unicode Safety Check

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 0'  # Weekly full scan (Sundays 3 AM UTC)
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  unicode-safety:
    name: Detect hidden unicode characters
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Unicode Safety Check
        uses: dcondrey/unicode-safety-check@0ee6d0bec92c640765f97a0514a9cf1613a34162 # v3.0.0
        with:
          scan-mode: ${{ github.event_name == 'schedule' && 'all' || 'changed' }}
