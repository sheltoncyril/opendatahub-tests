name: Check Stray Container Images

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'tests/**/*.py'
      - 'utilities/**/*.py'

permissions:
  contents: read
  pull-requests: write

jobs:
  check-stray-images:
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: uv sync

      - name: Run stray image check
        id: check
        run: |
          uv run python scripts/check_stray_images.py \
            --diff-base origin/${{ github.base_ref }} --json > findings.json 2>&1 || true
          echo "count=$(jq length findings.json)" >> "$GITHUB_OUTPUT"

      - name: Post review comments
        if: steps.check.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const findings = JSON.parse(fs.readFileSync('findings.json', 'utf8'));

            if (findings.length === 0) return;

            const { data: pull } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const comments = findings.map(f => ({
              path: f.file,
              line: f.line,
              body: [
                `⚠️ **Stray container image detected**`,
                ``,
                '```',
                f.image,
                '```',
                ``,
                `Container images used in tests need to be centralized in a constants class so they are included in the image manifest embedded in the \`odh-tests\` container. This manifest is used to mirror all required images for **disconnected/air-gapped testing** environments — without it, this image won't be available in those clusters.`,
                ``,
                `**To fix**, move the image to the appropriate constants class:`,
                `- \`tests/ai_safety/constants.py → AiSafetyImages\``,
                `- \`utilities/constants.py → ContainerImages\``,
                `- Or create a new class and register it in \`scripts/generate_image_manifest.py → IMAGE_SOURCES\``,
                ``,
                `**Not used in disconnected tests?** If this image is only used in tests that are skipped on disconnected clusters, you can keep it where it is — just add \`# noqa: IMG001\` to the line to suppress this check.`,
              ].join('\n'),
            }));

            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                commit_id: pull.head.sha,
                event: 'COMMENT',
                comments: comments,
              });
            } catch (e) {
              // Fall back to PR comment if inline comments fail (e.g. line not in diff)
              const body = [
                '⚠️ **Stray container images detected**\n',
                ...findings.map(f => `- \`${f.file}:${f.line}\`: \`${f.image}\``),
                '',
                'These images need to be in a constants class so they are included in the image manifest for **disconnected testing** (mirror list).',
                '',
                'Move them to the appropriate constants class, or add `# noqa: IMG001` if they are only used in tests that are skipped on disconnected clusters.',
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail if stray images found
        if: steps.check.outputs.count != '0'
        run: |
          echo "Found $(jq length findings.json) stray container image(s). See PR review comments."
          exit 1
