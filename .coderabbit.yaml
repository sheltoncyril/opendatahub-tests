# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# Inherits from org-wide config: https://github.com/opendatahub-io/coderabbit
# Only overrides listed below differ from the org baseline.

inheritance: true

reviews:
  review_status: false
  changed_files_summary: true
  suggested_labels: true
  suggested_reviewers: true
  related_issues: true
  related_prs: true

  path_filters:
    - "!.github/**"

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

  auto_review:
    ignore_title_keywords:
      - "wip"
      - "do not merge"
      - "do not review"
      - "lock file maintenance"
      - "pre-commit autoupdate"

  tools:
    languagetool:
      enabled: true
    biome:
      enabled: true
    swiftlint:
      enabled: true
    phpstan:
      enabled: true
    detekt:
      enabled: true
    rubocop:
      enabled: true
    buf:
      enabled: true
    regal:
      enabled: true
    pmd:
      enabled: true
    circleci:
      enabled: true
    clippy:
      enabled: true
    prismaLint:
      enabled: true
    pylint:
      enabled: true
    oxc:
      enabled: true
    shopifyThemeCheck:
      enabled: true
    luacheck:
      enabled: true
    brakeman:
      enabled: true
    dotenvLint:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  web_search:
    enabled: true
  pull_requests:
    scope: auto
